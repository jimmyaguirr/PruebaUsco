<h2 mat-dialog-title>{{ esEdicion ? 'Editar' : 'Nueva' }} Convocatoria</h2>

<mat-dialog-content>
  <form [formGroup]="formulario">

    <mat-form-field appearance="outline" class="campo-completo">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="nombre">
    </mat-form-field>

    <mat-form-field appearance="outline" class="campo-completo">
      <mat-label>Descripción</mat-label>
      <textarea matInput formControlName="descripcion" rows="3"></textarea>
    </mat-form-field>

    <div class="fila-fechas">
      <mat-form-field appearance="outline" class="campo-mitad">
        <mat-label>Fecha inicio</mat-label>
        <input matInput [matDatepicker]="pickerInicio" formControlName="fechaInicio">
        <mat-datepicker-toggle matSuffix [for]="pickerInicio"></mat-datepicker-toggle>
        <mat-datepicker #pickerInicio></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline" class="campo-mitad">
        <mat-label>Fecha fin</mat-label>
        <input matInput [matDatepicker]="pickerFin" formControlName="fechaFin">
        <mat-datepicker-toggle matSuffix [for]="pickerFin"></mat-datepicker-toggle>
        <mat-datepicker #pickerFin></mat-datepicker>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="campo-completo">
      <mat-label>Cupos disponibles</mat-label>
      <input matInput type="number" formControlName="cuposDisponibles" min="0">
    </mat-form-field>

    <mat-form-field appearance="outline" class="campo-completo">
      <mat-label>Estado</mat-label>
      <mat-select formControlName="estado">
        @for (estado of estados; track estado) {
        <mat-option [value]="estado">{{ estado }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="campo-completo">
      <mat-label>Categorías</mat-label>
      <mat-select formControlName="idsCategorias" multiple>
        @for (categoria of categoriasDisponibles(); track categoria.id) {
        <mat-option [value]="categoria.id">{{ categoria.nombre }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">Cancelar</button>
  <button mat-flat-button color="primary" (click)="guardar()">Guardar</button>
</mat-dialog-actions>
