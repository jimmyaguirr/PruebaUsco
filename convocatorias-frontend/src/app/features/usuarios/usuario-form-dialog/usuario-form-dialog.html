<h2 mat-dialog-title>{{ esEdicion ? 'Editar' : 'Nuevo' }} Usuario</h2>

<mat-dialog-content>
  <form [formGroup]="formulario">

    <mat-form-field appearance="outline" class="campo-completo">
      <mat-label>Identificación</mat-label>
      <input matInput formControlName="identificacion">
    </mat-form-field>

    <mat-form-field appearance="outline" class="campo-completo">
      <mat-label>Nombre completo</mat-label>
      <input matInput formControlName="nombre">
    </mat-form-field>

    <mat-form-field appearance="outline" class="campo-completo">
      <mat-label>Correo</mat-label>
      <input matInput type="email" formControlName="correo">
    </mat-form-field>

    <mat-form-field appearance="outline" class="campo-completo">
      <mat-label>{{ esEdicion ? 'Nueva contraseña (opcional)' : 'Contraseña' }}</mat-label>
      <input matInput type="password" formControlName="password">
    </mat-form-field>

    <mat-form-field appearance="outline" class="campo-completo">
      <mat-label>Rol</mat-label>
      <mat-select formControlName="rol">
        @for (rol of roles; track rol) {
        <mat-option [value]="rol">{{ rol }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="campo-completo">
      <mat-label>Estado</mat-label>
      <mat-select formControlName="estado">
        @for (estado of estados; track estado) {
        <mat-option [value]="estado">{{ estado }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">Cancelar</button>
  <button mat-flat-button color="primary" (click)="guardar()">Guardar</button>
</mat-dialog-actions>
