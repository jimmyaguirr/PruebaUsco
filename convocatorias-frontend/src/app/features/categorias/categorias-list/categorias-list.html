<div class="encabezado">
  <div>
    <h1>Gestión de Categorías</h1>
    <p class="subtitulo">{{ categorias().length }} categorías registradas</p>
  </div>
  <button mat-flat-button color="primary" (click)="abrirFormulario()">
    <mat-icon>add</mat-icon> Nueva Categoría
  </button>
</div>

<div class="contenedor-tabla-scroll">
  <table mat-table [dataSource]="categorias()" class="tabla-categorias">

    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let categoria">
        <div class="celda-categoria">
          <div class="icono-categoria"><mat-icon>category</mat-icon></div>
          <span class="nombre-categoria">{{ categoria.nombre }}</span>
        </div>
      </td>
    </ng-container>

    <ng-container matColumnDef="descripcion">
      <th mat-header-cell *matHeaderCellDef>Descripción</th>
      <td mat-cell *matCellDef="let categoria" class="celda-descripcion">{{ categoria.descripcion || '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef class="columna-acciones">Acciones</th>
      <td mat-cell *matCellDef="let categoria" class="columna-acciones">
        <button mat-icon-button color="primary" (click)="abrirFormulario(categoria)" title="Editar">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="eliminar(categoria)" title="Eliminar">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columnas"></tr>
    <tr mat-row *matRowDef="let row; columns: columnas;" class="fila-tabla"></tr>
  </table>
</div>

@if (categorias().length === 0) {
<p class="sin-datos">No hay categorías registradas.</p>
}
